<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Meeting | Conf.</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div class="meeting-wrapper">
        <header class="header">
            <a href="index.html" class="logo-container">
                <img src="logo.png" alt="Conf. Logo" class="logo-img">
                <div class="logo-text">Conf.</div>
            </a>
            <div id="room-name-display" style="font-weight: 500; font-family: 'Outfit'; color: var(--text-secondary);">
                Room: -</div>
            <div class="header-actions">
                <button id="share-btn" class="btn btn-share" title="Share Meeting">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" />
                        <polyline points="16 6 12 2 8 6" />
                        <line x1="12" y1="2" x2="12" y2="15" />
                    </svg>
                    Share
                </button>
                <!-- <button id="theme-toggle" class="theme-toggle" title="Toggle Theme">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                </button> -->
                <a href="index.html" class="btn btn-primary"
                    style="padding: 0.35rem 0.75rem; background-color: #ef4444; border-radius: 6px; font-size: 0.8rem;">
                    Leave
                </a>
            </div>
        </header>

        <div class="iframe-container">
            <iframe id="mirotalk-iframe" src=""
                allow="camera; microphone; display-capture; fullscreen; clipboard-read; clipboard-write; web-share; autoplay; picture-in-picture"
                title="MiroTalk Video Conference">
            </iframe>
        </div>
    </div>

    <!-- Share Modal -->
    <div id="share-modal" class="modal-overlay">
        <div class="modal-content glass">
            <button id="close-share" class="close-modal">&times;</button>
            <h2 class="modal-title">Share the room</h2>
            <div class="qr-code-container">
                <img id="qr-code-img" src="" alt="QR Code">
            </div>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1rem;">Invite others to join by
                sending them this link</p>
            <div class="share-link-box">
                <div id="share-link-text" class="share-link-text"></div>
                <button id="copy-link-btn" class="copy-btn">Copy URL</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Specific meeting page logic
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const roomId = params.get('room');
            const userName = params.get('name') || 'Guest';
            const roomNameDisplay = document.getElementById('room-name-display');
            const iframe = document.getElementById('mirotalk-iframe');

            if (roomId) {
                roomNameDisplay.textContent = `Room: ${roomId}`;
                // MiroTalk join URL - adding &share=0 and &notify=0 to suppress their UI
                const encodedName = encodeURIComponent(userName);
                const mirotalkUrl = `https://sfu.mirotalk.com/join?room=${roomId}&name=${encodedName}&audio=1&video=1&share=0&notify=0`;
                iframe.src = mirotalkUrl;

                // Setup Share Modal
                const shareBtn = document.getElementById('share-btn');
                const shareModal = document.getElementById('share-modal');
                const closeShare = document.getElementById('close-share');
                const copyBtn = document.getElementById('copy-link-btn');
                const shareText = document.getElementById('share-link-text');
                const qrImg = document.getElementById('qr-code-img');

                // Generate our own meeting link
                const protocol = window.location.protocol;
                const host = window.location.host;
                const path = window.location.pathname.replace('meeting.html', 'index.html');
                const confUrl = `${protocol}//${host}${path}?room=${roomId}`;
                shareText.textContent = confUrl;

                // Generate QR Code using QRServer API
                qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(confUrl)}`;

                shareBtn.addEventListener('click', () => {
                    shareModal.style.display = 'flex';
                });

                closeShare.addEventListener('click', () => {
                    shareModal.style.display = 'none';
                });

                window.addEventListener('click', (e) => {
                    if (e.target === shareModal) {
                        shareModal.style.display = 'none';
                    }
                });

                copyBtn.addEventListener('click', () => {
                    navigator.clipboard.writeText(confUrl).then(() => {
                        const originalText = copyBtn.textContent;
                        copyBtn.textContent = 'Copied!';
                        copyBtn.style.backgroundColor = '#10b981';
                        setTimeout(() => {
                            copyBtn.textContent = originalText;
                            copyBtn.style.backgroundColor = '';
                        }, 2000);
                    });
                });
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>

</html>
